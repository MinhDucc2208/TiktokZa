<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TikTok AI Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/charts.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body>
<div class="cosmic-bg"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<canvas class="constellation" id="constellation"></canvas>

<button class="mobile-toggle" onclick="App.toggleSidebar()">
<i class="fas fa-bars"></i>
</button>

<div class="app-container">
<aside class="sidebar" id="sidebar">
<div class="sidebar-header">
<div class="brand-orb">T</div>
<div class="brand-title">TikTok AI Pro</div>
<div class="brand-subtitle">Phân Tích Thông Minh</div>
</div>
<nav>
<div class="menu-group">
<div class="menu-label">Phân tích</div>
<button class="menu-item active" data-view="dashboard" onclick="App.showView('dashboard')">
<span class="menu-icon"><i class="fas fa-chart-pie"></i></span>
<span>Tổng quan</span>
</button>
<button class="menu-item" data-view="trend" onclick="App.showView('trend')">
<span class="menu-icon"><i class="fas fa-fire"></i></span>
<span>Điểm Xu Hướng</span>
</button>
<button class="menu-item" data-view="virality" onclick="App.showView('virality')">
<span class="menu-icon"><i class="fas fa-bolt"></i></span>
<span>Tiềm Năng Viral</span>
</button>
<button class="menu-item" data-view="engagement" onclick="App.showView('engagement')">
<span class="menu-icon"><i class="fas fa-heart-pulse"></i></span>
<span>Tương Tác</span>
</button>
<button class="menu-item" data-view="performance" onclick="App.showView('performance')">
<span class="menu-icon"><i class="fas fa-gauge-high"></i></span>
<span>Hiệu Suất</span>
</button>
</div>
<div class="menu-group">
<div class="menu-label">Tối ưu</div>
<button class="menu-item" data-view="seo" onclick="App.showView('seo')">
<span class="menu-icon"><i class="fas fa-magnifying-glass"></i></span>
<span>Phân Tích SEO</span>
</button>
<button class="menu-item" data-view="hashtags" onclick="App.showView('hashtags')">
<span class="menu-icon"><i class="fas fa-hashtag"></i></span>
<span>Chiến Lược Hashtag</span>
<span class="menu-badge">HOT</span>
</button>
<button class="menu-item" data-view="besttime" onclick="App.showView('besttime')">
<span class="menu-icon"><i class="fas fa-clock"></i></span>
<span>Thời Điểm Vàng</span>
</button>
</div>
<div class="menu-group">
<div class="menu-label">Công cụ</div>
<button class="menu-item" data-view="compare" onclick="App.showView('compare')">
<span class="menu-icon"><i class="fas fa-code-compare"></i></span>
<span>So Sánh Video</span>
</button>
<button class="menu-item" data-view="download" onclick="App.showView('download')">
<span class="menu-icon"><i class="fas fa-download"></i></span>
<span>Tải Video</span>
</button>
</div>
<div class="menu-group">
<div class="menu-label">Lưu trữ</div>
<button class="menu-item" data-view="history" onclick="App.showView('history')">
<span class="menu-icon"><i class="fas fa-clock-rotate-left"></i></span>
<span>Lịch Sử</span>
</button>
<button class="menu-item" data-view="favorites" onclick="App.showView('favorites')">
<span class="menu-icon"><i class="fas fa-star"></i></span>
<span>Yêu Thích</span>
</button>
</div>
</nav>
</aside>

<main class="main-content">
<header class="header-premium">
<div class="header-title">
<h1 id="pageTitle">Bảng Điều Khiển</h1>
<p>Phân tích sâu với công nghệ AI tiên tiến</p>
</div>
<div class="header-actions">
<button class="action-btn" onclick="App.toggleTheme()" title="Chuyển đổi giao diện">
<i class="fas fa-moon"></i>
</button>
<button class="action-btn" onclick="App.exportReport()" title="Xuất báo cáo">
<i class="fas fa-file-pdf"></i>
</button>
<button class="action-btn" onclick="App.showSettings()" title="Cài đặt">
<i class="fas fa-gear"></i>
</button>
</div>
</header>

<div class="input-cinematic">
<div class="input-orbit">
<div class="input-molecule">
<i class="fas fa-link input-atom"></i>
<input type="text" id="urlInput" placeholder="Dán link video TikTok vào đây..." autocomplete="off">
</div>
<button class="analyze-liquid" id="analyzeBtn" onclick="App.analyze()">
<i class="fas fa-sparkles"></i>
<span>Phân tích ngay</span>
</button>
</div>
<div id="status"></div>
</div>

<div id="content"></div>
</main>
</div>

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/charts.js"></script>
<script src="js/components.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/trend.js"></script>
<script src="js/views/virality.js"></script>
<script src="js/views/engagement.js"></script>
<script src="js/views/performance.js"></script>
<script src="js/views/seo.js"></script>
<script src="js/views/hashtags.js"></script>
<script src="js/views/besttime.js"></script>
<script src="js/views/compare.js"></script>
<script src="js/views/download.js"></script>
<script src="js/views/history.js"></script>
<script src="js/views/favorites.js"></script>
<script src="js/app.js"></script>
</body>
</html>
